        async function handleContactSubmit(e) {
            e.preventDefault();
            const form = e.target;
            const statusEl = document.getElementById('form-status');
            const btn = document.getElementById('contact-submit');
            const key = form.querySelector('[name="access_key"]').value;

            if (!key || key === 'YOUR_ACCESS_KEY_HERE') {
                statusEl.className = 'text-sm text-center text-red-700';
                statusEl.textContent = 'Form not configured yet. Please email adhmukesh@gmail.com directly.';
                return;
            }

            btn.disabled = true;
            const original = btn.textContent;
            btn.textContent = 'Sending…';
            statusEl.className = 'text-sm text-center text-muted';
            statusEl.textContent = '';

            try {
                const res = await fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    headers: { 'Accept': 'application/json' },
                    body: new FormData(form)
                });
                const json = await res.json();
                if (json.success) {
                    form.reset();
                    statusEl.className = 'text-sm text-center text-navy';
                    statusEl.textContent = 'Thank you! Your message has been sent.';
                } else {
                    statusEl.className = 'text-sm text-center text-red-700';
                    statusEl.textContent = 'Something went wrong. Please email adhmukesh@gmail.com directly.';
                }
            } catch (err) {
                statusEl.className = 'text-sm text-center text-red-700';
                statusEl.textContent = 'Network error. Please email adhmukesh@gmail.com directly.';
            } finally {
                btn.disabled = false;
                btn.textContent = original;
            }
        }
