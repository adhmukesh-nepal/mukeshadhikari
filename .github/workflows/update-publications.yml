name: Sync publications from ORCID

# Runs weekly (and on-demand). When ORCID lists a publication that isn't yet in
# publications.json, it's added to the "other" bucket and a pull request is opened
# for you to review, categorise (us / nepal), and tag before it goes live.

on:
  schedule:
    - cron: "0 12 * * 1"   # every Monday 12:00 UTC
  workflow_dispatch:        # lets you run it manually from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      ORCID_ID: "0000-0002-1091-328X"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync from ORCID
        run: python3 scripts/sync_publications.py

      - name: Open pull request if anything changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Add newly published articles from ORCID"
          branch: auto/new-publications
          delete-branch: true
          title: "New publication(s) found on ORCID"
          body: |
            Automated sync from your ORCID profile found new publication(s).

            They were added to the **`other`** list in `publications.json`.
            Before merging, please:

            1. Move each entry into `us` or `nepal`.
            2. Fix the title / journal if ORCID's version is off.
            3. Add `tags`.

            Merging publishes them to the site.
          labels: publications, automated
